"""A user broker connection"""
type Account {
  createdAt: DateTime
  id: ID
  providerName: String
  status: BrokerConnStatus
  updatedAt: DateTime
}

union ApproveProposalResult = AuthError | NotFoundError | Proposal

type AuthError implements BaseError {
  message: String
}

"""Computed balance summary for the authenticated user"""
type Balance {
  cashBalance: Decimal
  dayPnl: Decimal
  dayPnlPercent: Decimal
  investedValue: Decimal
  totalValue: Decimal
}

interface BaseError {
  message: String
}

"""A user-configured AI trading bot"""
type Bot {
  activePosition: Position
  allocationPct: Decimal
  combatPatience: CombatPatience
  createdAt: DateTime
  dailyMaxGain: Decimal
  dailyMaxLoss: Decimal
  frame: BotFrame
  id: ID
  name: String
  owner: User
  proposals(status: ProposalStatus): [Proposal!]
  riskAttitude: RiskAttitude
  status: BotStatus
  tradeTempo: TradeTempo
  updatedAt: DateTime
}

enum BotFrame {
  BERSERKER
  BRAWLER
  BRUISER
  GUARDIAN
  SCOUT
  SNIPER
}

union BotResult = Bot | NotFoundError | ValidationError

enum BotStatus {
  ACTIVE
  ARCHIVED
  DRAFT
  PAUSED
}

enum BrokerConnStatus {
  ACTIVE
  ERROR
  REVOKED
}

enum CombatPatience {
  CALCULATED
  IMPULSIVE
  PATIENT
  STRATEGIC
}

union ConnectBrokerResult = Account | ValidationError

input CreateBotInput {
  allocationPct: Decimal!
  combatPatience: CombatPatience!
  dailyMaxGain: Decimal!
  dailyMaxLoss: Decimal!
  frameName: BotFrame!
  name: String!
  riskAttitude: RiskAttitude!
  tradeTempo: TradeTempo!
}

union CreateBotResult = Bot | ValidationError

scalar DateTime

scalar Decimal

type Mutation {
  activateBot(id: ID!): BotResult
  approveProposal(id: ID!): ApproveProposalResult

  """Mark the authenticated user's FTUE as complete. Idempotent."""
  completeOnboarding: Boolean
  connectBroker(brokerName: String!, credentials: String!): ConnectBrokerResult
  createBot(input: CreateBotInput!): CreateBotResult
  deleteBot(id: ID!): BotResult
  pauseBot(id: ID!): BotResult
  skipProposal(id: ID!): SkipProposalResult
  updateBot(id: ID!, input: UpdateBotInput!): UpdateBotResult
}

type NotFoundError implements BaseError {
  message: String
}

enum OrderEntryType {
  LIMIT
  MARKET
}

"""An open or closed trading position held by a bot"""
type Position {
  avgEntryPrice: Decimal
  bot: Bot
  closedAt: DateTime
  id: ID
  minHoldUntil: DateTime
  openedAt: DateTime
  qty: Decimal
  status: PositionStatus
  symbol: String
}

enum PositionStatus {
  CLOSED
  OPEN
}

"""A trade proposal generated by a bot, pending user approval"""
type Proposal {
  bot: Bot
  confidence: Decimal
  createdAt: DateTime
  entryType: OrderEntryType
  expiresAt: DateTime
  id: ID
  limitPrice: Decimal
  minHoldUntil: DateTime
  qty: Decimal
  rationaleText: String
  side: ProposalSide
  status: ProposalStatus
  stopPrice: Decimal
  symbol: String
  targetPrice: Decimal
}

enum ProposalSide {
  BUY
  SELL
}

enum ProposalStatus {
  APPROVED
  CANCELLED
  EXPIRED
  PENDING
  SKIPPED
}

type Query {
  account: Account
  balance: Balance
  bot(id: ID!): Bot
  bots: [Bot!]
  me: User
  positions: [Position!]
  proposals(status: ProposalStatus): [Proposal!]
}

enum RiskAttitude {
  AGGRESSIVE
  BALANCED
  CAUTIOUS
}

union SkipProposalResult = AuthError | NotFoundError | Proposal

type Subscription {
  orderUpdated(botId: ID!): Position
  proposalCreated(botId: ID!): Proposal
}

enum TradeTempo {
  ACTIVE
  OPPORTUNISTIC
  RELENTLESS
}

input UpdateBotInput {
  allocationPct: Decimal
  combatPatience: CombatPatience
  dailyMaxGain: Decimal
  dailyMaxLoss: Decimal
  name: String
  riskAttitude: RiskAttitude
  tradeTempo: TradeTempo
}

union UpdateBotResult = Bot | NotFoundError | ValidationError

"""An authenticated Tachyon user"""
type User {
  auth0Id: String
  createdAt: DateTime
  email: String
  id: ID

  """Whether the user has completed the FTUE onboarding flow."""
  onboardingCompleted: Boolean!
}

type ValidationError implements BaseError {
  code: String
  field: String
  message: String
}